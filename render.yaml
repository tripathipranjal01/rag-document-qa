services:
  - type: web
    name: rag-document-qa
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python main_simple.py
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: PORT
        value: 10000
      - key: MAX_UPLOAD_MB
        value: 30
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: ENVIRONMENT
        value: production
    healthCheckPath: /api/health
